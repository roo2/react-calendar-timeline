{% extends "base.html" %}
{% block content %}
  <h1>Add Job</h1>
  {% if error %}
    <div class="error">{{ error }}</div>
  {% endif %}
  <form method="post" action="/orders/{{ order_id }}/jobs">
    <input type="hidden" name="_csrf" value="{{ identity.csrf or '' }}"/>
    <div>
      <label>Planned Qty</label>
      <input type="number" name="planned_qty" step="0.001" min="0" required />
    </div>
    <div>
      <label>Allocated Order Units (optional)</label>
      <input type="number" name="allocated_order_units" step="0.001" min="0" />
    </div>
    <div class="mt-3">
      <button type="submit">Create Job</button>
      <a href="/orders/{{ order_id }}">Cancel</a>
    </div>
  </form>
{% endblock %}
