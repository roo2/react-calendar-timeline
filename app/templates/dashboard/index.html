{% extends "base.html" %}
{% block content %}
<h1>Operational Dashboard</h1>

<div class="cards-grid" style="display:grid;grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap:16px;">
  <section class="card">
    <header><h3>Inventory & WIP</h3></header>
    <div id="card-inventory"
         hx-get="/dashboard/partial/inventory_snapshot"
         hx-trigger="load, every 60s"
         hx-swap="outerHTML">
      <em>Loading…</em>
    </div>
  </section>

  <section class="card">
    <header><h3>Throughput (Weekly)</h3></header>
    <div id="card-throughput"
         hx-get="/dashboard/partial/throughput_weekly"
         hx-trigger="load, every 60s"
         hx-swap="outerHTML">
      <em>Loading…</em>
    </div>
  </section>
</div>
{% endblock %}
