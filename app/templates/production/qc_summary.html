{% extends "base.html" %}
{% block content %}
<h2>Job QC Summary</h2>

<div style="margin-bottom: 12px;">
  <div><strong>Job:</strong> {{ ctx.job_code if ctx else '' }}</div>
  <div><strong>Order:</strong> {{ ctx.order_code if ctx else '' }}</div>
</div>

<div style="display:flex;gap:8px;margin-bottom:12px;">
  <button
    hx-post="/production/jobs/{{ job_id }}/qc-summary/aggregate"
    hx-target="#qc-summary-panel"
    hx-swap="innerHTML"
    hx-headers='{"X-CSRF-Token":"{{ csrf }}"}'>
    Aggregate QC
  </button>
  <a href="/production" style="align-self:center;">Back to Production</a>
</div>

<div id="qc-summary-panel"
     hx-post="/production/jobs/{{ job_id }}/qc-summary/aggregate"
     hx-headers='{"X-CSRF-Token":"{{ csrf }}"}'
     hx-trigger="load"
     hx-swap="innerHTML">
  <em>Loading QC summary…</em>
  <!-- Will be replaced by _qc_summary_panel.html -->
</div>
{% endblock %}
