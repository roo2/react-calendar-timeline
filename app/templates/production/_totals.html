<div id="totals-slot">
  <div style="display:flex;gap:16px;flex-wrap:wrap;">
    <div style="flex:1;min-width:240px;border:1px solid #ddd;border-radius:6px;padding:8px;">
      <h5 style="margin:0 0 8px;">Run Totals</h5>
      <ul style="margin:0;padding-left:16px;">
        {% for k, v in totals.run_totals.items() %}
          <li>{{ k }}: {{ v }}</li>
        {% else %}
          <li><em>No entries yet</em></li>
        {% endfor %}
      </ul>
    </div>
    <div style="flex:1;min-width:240px;border:1px solid #ddd;border-radius:6px;padding:8px;">
      <h5 style="margin:0 0 8px;">Job Totals</h5>
      <ul style="margin:0;padding-left:16px;">
        {% for k, v in totals.job_totals.items() %}
          <li>{{ k }}: {{ v }}</li>
        {% else %}
          <li><em>No entries yet</em></li>
        {% endfor %}
      </ul>
    </div>
  </div>
</div>
