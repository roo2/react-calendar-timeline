{% extends "base.html" %}
{% block content %}
<style>
  .inv-actions { margin: 1rem 0; display: flex; gap: .75rem; flex-wrap: wrap; }
  .btn { padding: .5rem .8rem; border: 1px solid #ccc; border-radius: 6px; text-decoration: none; color: #111; background: #f8f8f8; }
  .btn:hover { background: #efefef; }
</style>
<h1>Inventory</h1>
<div class="inv-actions">
  <a class="btn" href="/inventory/receive">Receive Inventory</a>
  <a class="btn" href="/inventory/adjust">Adjust Inventory</a>
  <a class="btn" href="/inventory/transactions">View Transactions</a>
</div>
<div id="inv-balances"
     hx-get="/inventory"
     hx-trigger="load, every 45s"
     hx-select="#inv-balances"
     hx-swap="outerHTML">
  {% include "inventory/_balances.html" %}
</div>
{% endblock %}
