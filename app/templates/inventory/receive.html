{% extends "base.html" %}
{% block content %}
<h2>Receive Inventory</h2>
<style>
  form .row { margin: .5rem 0; display: flex; gap: .75rem; align-items: center; }
  label { min-width: 140px; font-weight: 600; }
  input, select, textarea { padding: .4rem .5rem; border: 1px solid #ccc; border-radius: 6px; }
  .btn { padding: .5rem .8rem; border: 1px solid #ccc; border-radius: 6px; text-decoration: none; color: #111; background: #f8f8f8; }
  .btn:hover { background: #efefef; }
  .help { color: #666; font-size: .9em; }
  #form-messages { color: #b71c1c; margin: .5rem 0; }
</style>
<div id="form-messages"></div>
<form hx-post="/inventory/receive"
      hx-target="#inv-balances"
      hx-swap="outerHTML"
      hx-headers='{"X-CSRF-Token": "{{ request.state.csrf or "" }}"}'
      hx-on::after-request="if (event.detail.xhr.status >= 400) { document.getElementById('form-messages').innerText = event.detail.xhr.response || 'Validation error'; } else { document.getElementById('form-messages').innerText = 'Received inventory successfully.' }">
  <div>
    <label>Category</label>
    <input name="category" value="raw_material" readonly />
  </div>
  <div>
    <label>Item ID (optional)</label>
    <input name="item_id" placeholder="UUID" />
    <span class="help">Leave blank if not tracking by item.</span>
  </div>
  <div>
    <label>Quantity (kg)</label>
    <input name="quantity" type="number" step="0.001" min="0.001" required />
  </div>
  <div>
    <label>UOM</label>
    <input name="uom" value="kg" required />
  </div>
  <div>
    <button class="btn" type="submit">Receive</button>
    <a class="btn" href="/inventory">Cancel</a>
  </div>
{% endblock %}
