[tool.black]
line-length = 100
target-version = ["py311"]

[tool.isort]
profile = "black"
line_length = 100

[tool.ruff]
line-length = 100
target-version = "py311"
select = ["E", "F", "I", "B", "UP"]
ignore = []
exclude = ["app/db/migrations/*"]

[tool.mypy]
python_version = "3.11"
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true
no_implicit_optional = true
check_untyped_defs = true
exclude = "app/db/migrations/|tests/"

[tool.pytest.ini_options]
addopts = "-q --cov=app --cov-report=term-missing:skip-covered --no-header --disable-warnings"
testpaths = ["tests"]


